<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empire Executive Limo | Bookings</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
      body { background: #101215; }
      .admin-shell { width: min(1120px, calc(100vw - 32px)); margin: 0 auto; padding: 120px 0 56px; }
      .admin-header { display: flex; justify-content: space-between; gap: 18px; align-items: end; margin-bottom: 24px; }
      .admin-header h1 { font-size: clamp(34px, 6vw, 64px); margin: 0; }
      .admin-controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 18px; }
      .admin-filters { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 18px; }
      .admin-filters label { display: inline-flex; min-height: 48px; align-items: center; gap: 8px; color: var(--muted); }
      .admin-filters input[type="checkbox"] { width: auto; min-height: auto; }
      .booking-list { display: grid; gap: 12px; }
      .booking-card { display: grid; gap: 12px; padding: 16px; border: 1px solid var(--line); background: var(--panel); }
      .booking-card header { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
      .booking-card h2 { margin: 0; font: 800 18px/1.25 Inter, sans-serif; }
      .booking-card strong { color: var(--gold-strong); }
      .booking-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; color: var(--muted); font-size: 14px; }
      .booking-grid span { display: block; color: var(--text); overflow-wrap: anywhere; }
      .booking-actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .admin-note { min-height: 22px; color: var(--muted); }
      @media (max-width: 760px) {
        .admin-header, .admin-controls, .admin-filters { grid-template-columns: 1fr; display: grid; }
        .booking-card header { display: grid; }
        .booking-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header class="site-header" aria-label="Admin navigation">
      <a class="brand" href="./" aria-label="Empire Executive Limo home">
        <span class="brand-mark">E</span>
        <span><strong>Empire Executive Limo</strong><small>Bookings</small></span>
      </a>
      <a class="call-link" href="./">Back to site</a>
    </header>
    <main class="admin-shell">
      <div class="admin-header">
        <div><p class="eyebrow">Admin</p><h1>Paid Bookings</h1></div>
        <button class="button primary" id="refresh-bookings" type="button">Refresh</button>
      </div>
      <div class="admin-controls">
        <input id="admin-token" type="password" placeholder="Admin token" autocomplete="off">
        <button class="button primary" id="load-bookings" type="button">Load bookings</button>
      </div>
      <div class="admin-filters">
        <input id="booking-search" type="search" placeholder="Search date, customer, pickup, drop-off">
        <label><input id="show-tests" type="checkbox"> Show test bookings</label>
      </div>
      <p class="admin-note" id="admin-note">Enter the admin token to load paid bookings.</p>
      <section class="booking-list" id="booking-list" aria-live="polite"></section>
    </main>
    <script src="./admin.js"></script>
  </body>
</html>
